services:
  - type: web
    name: imara-ai-service
    env: python
    region: oregon
    plan: free
    runtime: python-3.11.9
    buildCommand: pip install -r requirements.txt && python -c "from huggingface_hub import snapshot_download; snapshot_download(repo_id='linkanjarad/mobilenet_v2_1.0_224-plant-disease-identification', local_dir='./models/hf_model', ignore_patterns=['*.msgpack', 'flax_model*', 'rust_model*', 'onnx*'])"
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8000
      - key: HOST
        value: 0.0.0.0
      - key: API_KEY
        value: imara-ai-key-2024-secure
      - key: USE_HF_API
        value: false
      - key: MODEL_MODE
        value: local
      - key: DEMO_MODE
        value: false
      - key: HF_MODEL_PATH
        value: ./models/hf_model
      - key: HF_API_TOKEN
        sync: false  # You'll add this in Render dashboard
      - key: HF_REPO_ID
        value: linkanjarad/mobilenet_v2_1.0_224-plant-disease-identification
      - key: CONFIDENCE_THRESHOLD
        value: 0.5
      - key: ALLOWED_ORIGINS
        value: https://resilient-starship-55ff3d.netlify.app,https://imara-bn.onrender.com
