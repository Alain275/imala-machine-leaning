name: ML CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ml-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt
      - run: python -m venv .venv
      - run: .venv/bin/pip install -r requirements.txt
      - run: .venv/bin/pip check
      - name: Compile application sources
        run: .venv/bin/python -m py_compile main.py fetch_model_local.py
      - name: Validate FastAPI import and health route without loading the model
        env:
          MODEL_MODE: demo
          DEMO_MODE: "true"
        run: .venv/bin/python -c "import main; assert any(getattr(r, 'path', '') == '/health' for r in main.app.routes)"
      - run: .venv/bin/python -m pytest -q
        if: ${{ hashFiles('test_*.py', 'tests/**') != '' }}
